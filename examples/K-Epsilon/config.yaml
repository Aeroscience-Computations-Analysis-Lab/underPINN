problem: k_epsilon   # run via:  python examples/K-Epsilon/turbulence.py

network:
  layers : [2, 96, 96, 96, 96, 96, 5]   # (x,y) → (u, v, p, k, ε)

physics:
  Re: 10000.0   # Reynolds number (ν = 1/Re)

# Backward-facing step geometry (BFS):
#   Inlet x=0, 0.9423 ≤ y ≤ 1.9423
#   Outlet x=35, 0 ≤ y ≤ 1.9423
#   Step at x=5, 0 ≤ y ≤ 0.9423
geometry:
  step_height : 0.9423
  channel_h   : 1.9423
  channel_l   : 35.0
  step_x      : 5.0

data:
  n_collocation : 80000   # interior residual points (boundary-weighted)
  n_inlet       : 200
  n_outlet      : 200
  n_noslip      : 900     # wall no-slip points (top + bottom + step)

training:
  epochs    : 10
  lr        : 1.0e-3
  lr_schedule:
    boundaries : [2000, 4000]
    scales     : [0.5,  0.5]
  batch_size: 2000
  log_every : 1
  seed      : 42

loss:
  w_pde    : 1.0
  w_inlet  : 10.0
  w_outlet : 5.0
  w_noslip : 20.0
  w_data   : 5.0     # sparse CFD data weight

data_file: Re10000   # path to CFD reference CSV (columns: x-coordinate, y-coordinate, ...)

output:
  dir: outputs/k_epsilon
