problem: burgers

network:
  type      : fbpinn
  layers: [2, 64, 64, 64, 1]  
  attention : simple_gate               # simple_gate | hybrid_attention

physics:
  nu: 0.01

data:
  T            : 2.0
  n_collocation: 20000
  n_ic         : 200
  n_bc         : 300

training:
  epochs                 : 5000
  lr                     : 1.0e-3
  lr_alpha               : 0.01
  batch_r                : 2048
  batch_i                : 256
  batch_b                : 256
  log_every              : 500
  # early_stopping_patience: 400
  seed                   : 0
  # Performance knobs (GPU-friendly defaults shown; omit to use default=off)
  # n_scan_steps    : 100   # fuse 100 steps into one XLA kernel (reduces Python overhead)
  # resample_period : 5     # RAR-D resampling every 5 outer steps (= 500 epochs)
  # resample_k      : 1.0   # weighting exponent |residual|^k

loss:
  ic_weight: 100.0
  bc_weight: 10.0
  rba      : true

output:
  dir        : outputs/burgers
  save_params: true
